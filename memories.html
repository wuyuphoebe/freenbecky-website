<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>回憶錄</title>
<style>
  body { font-family:sans-serif; margin:12px; }
  header { padding:12px; background:#eee; margin-bottom:12px; }
  nav a { margin-right:8px; text-decoration:none; color:#333; }
  .controls { margin-bottom:12px; }
  select, input { margin-right:6px; }

  #gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: left;
  }

  .card {
    border:1px solid #ccc;
    padding:12px;
    width:370px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .carousel-container {
    position: relative;
    width:150px;
    height:150px;
    margin-bottom:8px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .carousel-container img,
  .carousel-container video,
  .carousel-container iframe {
    width:100%;
    height:100%;
    object-fit: cover;
    border-radius:4px;
  }

  .carousel-btn {
    position: absolute;
    top: 50%;
    width:28px;
    height:28px;
    border-radius:50%;
    background: rgba(0,0,0,0.4);
    color: white;
    border: none;
    font-size:18px;
    cursor: pointer;
    display:flex;
    align-items: center;
    justify-content: center;
    transform: translateY(-50%);
    transition: background 0.2s;
  }

  .carousel-btn:hover { background: rgba(0,0,0,0.7); }
  .prev { left: -35px; }
  .next { right: -35px; }

  .meta {
    font-size:0.85em;
    text-align: left;
    width: 100%;
  }
  .meta div { margin-bottom:2px; }
</style>
</head>
<body>
<header>
  <h2>回憶錄</h2>
  <nav>
    <a href="index.html">首頁</a> | 
    <a href="map.html">踩點地圖</a> | 
    <a href="memories.html">回憶錄</a>
  </nav>
</header>

<div class="controls">
  年份: <select id="yearSelect"><option value="">全部</option></select>
  月份: <select id="monthSelect"><option value="">全部</option></select>
  搜尋: <input type="text" id="searchInput" placeholder="輸入關鍵字">
  <button id="resetBtn">重置</button>
</div>

<div id="gallery"></div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const filterLocation = urlParams.get('location');  // 地點 ID

fetch('data/locations.json')
.then(res => res.json())
.then(locations => {
  const photos = [];

  locations.forEach(loc => {
    // 如果有指定地點，且不是這個就跳過
    if(filterLocation && loc.id !== filterLocation) return;

    (loc.photos || []).forEach(p => {
      const date = p.timestamp ? new Date(p.timestamp) : null;
      photos.push({
        ...p,
        celebrity: loc.celebrity,
        locationId: loc.id,
        locationName: loc.name,
        year: date ? date.getFullYear() : '',
        month: date ? (date.getMonth() + 1) : ''
      });
    });
  });

  const gallery = document.getElementById('gallery');
  const yearSelect = document.getElementById('yearSelect');
  const monthSelect = document.getElementById('monthSelect');

  const years = [...new Set(photos.map(p=>p.year).filter(Boolean))].sort();
  years.forEach(y => { yearSelect.innerHTML += `<option value="${y}">${y}</option>`; });
  const months = [...new Set(photos.map(p=>p.month).filter(Boolean))].sort((a,b)=>a-b);
  months.forEach(m => { monthSelect.innerHTML += `<option value="${m}">${m}</option>`; });

  function renderMedia(url, index){
    if(/\.(jpg|jpeg|png|gif)$/i.test(url)){
      return `<img src="${url}" data-index="${index}">`;
    } else if(/\.(mp4|webm|ogg)$/i.test(url)){
      return `<video controls data-index="${index}">
                <source src="${url}" type="video/mp4">
                你的瀏覽器不支援影片播放
              </video>`;
    } else if(url.includes("youtube.com") || url.includes("youtu.be")){
      return `<iframe data-index="${index}" 
                src="${url.replace("watch?v=", "embed/")}" 
                frameborder="0" allowfullscreen></iframe>`;
    }
    return `<a href="${url}" target="_blank">查看媒體</a>`;
  }

  function render(list){
    if(!list.length){ 
      gallery.innerHTML = '<p>沒有符合的照片。</p>'; 
      return; 
    }

    gallery.innerHTML = list.map((p, idx) => {
      const mediaUrls = [
        ...(p.urls || []),
        ...(p.videos || [])
      ];
      const carouselId = `carousel-${idx}`;
      const carouselHTML = `
        <div class="carousel-container" id="${carouselId}">
          ${renderMedia(mediaUrls[0], 0)}
          ${mediaUrls.length > 1 ? `
            <button class="carousel-btn prev" onclick="prev('${carouselId}', ${idx})">&#10094;</button>
            <button class="carousel-btn next" onclick="next('${carouselId}', ${idx})">&#10095;</button>
          ` : ""}
        </div>
      `;
      return `<div class="card">
        ${carouselHTML}
        <div class="meta">
          <div>@ ${p.locationName}</div>
          <div><br><strong>${p.celebrity}</strong><br></div>
          <div>日期: ${p.timestamp}</div>
          <div>活動: ${p.event||'-'}</div>
          <div>平台: ${p.platform||'-'}</div>
          <div>PO: ${p.author||'-'}</div>
          <div>${p.caption||''}</div>
        </div>
      </div>`;
    }).join('');
  }

  function applyFilter(){
    let out = photos.slice();
    const year = yearSelect.value;
    const month = monthSelect.value;
    const kw = document.getElementById('searchInput').value.trim().toLowerCase();

    if(year) out = out.filter(p=>String(p.year)===year);
    if(month) out = out.filter(p=>String(p.month)===month);
    if(kw) out = out.filter(p=>{
      return (p.celebrity||'').toLowerCase().includes(kw) ||
             (p.locationName||'').toLowerCase().includes(kw) ||
             (p.event||'').toLowerCase().includes(kw) ||
             (p.platform||'').toLowerCase().includes(kw) ||
             (p.author||'').toLowerCase().includes(kw) ||
             (p.caption||'').toLowerCase().includes(kw);
    });

    render(out);
  }

  yearSelect.addEventListener('change', applyFilter);
  monthSelect.addEventListener('change', applyFilter);
  document.getElementById('searchInput').addEventListener('input', applyFilter);
  document.getElementById('resetBtn').addEventListener('click', ()=>{
    yearSelect.value=''; monthSelect.value=''; document.getElementById('searchInput').value=''; applyFilter();
  });

  applyFilter();

  window.prev = function(carouselId, parentIdx){
    const carousel = document.getElementById(carouselId);
    let media = carousel.querySelector("img, video, iframe");
    const idx = parseInt(media.dataset.index);
    const urls = [
      ...(photos[parentIdx].urls || []),
      ...(photos[parentIdx].videos || [])
    ];
    const newIdx = (idx - 1 + urls.length) % urls.length;
    carousel.innerHTML = renderMedia(urls[newIdx], newIdx) + 
                         `<button class="carousel-btn prev" onclick="prev('${carouselId}', ${parentIdx})">&#10094;</button>` + 
                         `<button class="carousel-btn next" onclick="next('${carouselId}', ${parentIdx})">&#10095;</button>`;
  }

  window.next = function(carouselId, parentIdx){
    const carousel = document.getElementById(carouselId);
    let media = carousel.querySelector("img, video, iframe");
    const idx = parseInt(media.dataset.index);
    const urls = [
      ...(photos[parentIdx].urls || []),
      ...(photos[parentIdx].videos || [])
    ];
    const newIdx = (idx + 1) % urls.length;
    carousel.innerHTML = renderMedia(urls[newIdx], newIdx) + 
                         `<button class="carousel-btn prev" onclick="prev('${carouselId}', ${parentIdx})">&#10094;</button>` + 
                         `<button class="carousel-btn next" onclick="next('${carouselId}', ${parentIdx})">&#10095;</button>`;
  }

});
</script>
</body>
</html>
