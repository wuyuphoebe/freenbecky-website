<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>踩點地圖</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  body { margin:0; font-family:sans-serif; }
  header { padding:12px; background:#eee; }
  nav a { margin-right:8px; text-decoration:none; color:#333; }
  #map { height:80vh; margin:12px; }
  .popup-image { width:120px; height:auto; display:block; margin-top:6px; }
</style>
</head>
<body>
<header>
  <h2>踩點地圖</h2>
  <nav>
    <a href="index.html">首頁</a> | 
    <a href="map.html">踩點地圖</a> | 
    <a href="memories.html">回憶錄</a>
  </nav>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

fetch('data/locations.json')
.then(res => res.json())
.then(locations => {
  const markers = [];

  locations.forEach(loc => {
    const marker = L.marker([loc.lat, loc.lng]).addTo(map);
    markers.push([loc.lat, loc.lng]);

    let popup = `<div><strong>${loc.name}</strong>`;

    if(loc.photos && loc.photos.length){
      const p = loc.photos[0]; // 第一張照片
      const firstImg = p.urls && p.urls.length ? p.urls[0] : p.url;
      popup += `<img src="${firstImg}" class="popup-image" alt="">
                <div><br><span>${loc.celebrity}</span><br></div>
                <div>${p.timestamp} ${p.event ? '- ' + p.event : ''}</div>`;
    }

    // 看更多照片連結
    popup += `<div style="margin-top:6px">
                <a href="memories.html?celebrity=${encodeURIComponent(loc.celebrity)}&location=${encodeURIComponent(loc.id)}">
                  看更多照片
                </a>
              </div>`;

    // 前往 Google 地圖分享連結
    if(loc.google_map_url){
      popup += `<div style="margin-top:4px">
                  <a href="${loc.google_map_url}" target="_blank">
                    前往 Google 地圖
                  </a>
                </div>`;
    }

    popup += `</div>`;

    marker.bindPopup(popup);
  });

  if(markers.length) map.fitBounds(markers);
})
.catch(err => console.error('載入資料失敗', err));
</script>
</body>
</html>
